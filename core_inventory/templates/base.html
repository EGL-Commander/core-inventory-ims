<!DOCTYPE html>
<html>
<head>

<title>IMS</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
width:230px;
height:100vh;
background:#1e293b;
position:fixed;
color:white;
}

.logo{
text-align:center;
padding:20px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar ul li{
padding:15px 20px;
}

.sidebar ul li a{
color:white;
text-decoration:none;
display:block;
}

.sidebar ul li:hover{
background:#3b82f6;
}

.active{
background:#3b82f6;
}

.main{
margin-left:230px;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card i{
font-size:40px;
color:#3b82f6;
margin-bottom:10px;
}

button{
padding:10px 20px;
border:none;
background:#3b82f6;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<h2 class="logo">IMS</h2>

<ul>

<li>
<a href="/"><i class="fa fa-home"></i> Dashboard</a>
</li>

<li>
<a href="/products/" class="{% if request.path == '/products/' %}active{% endif %}"><i class="fa fa-box"></i> Products</a>
</li>

<li>
<a href="/stock/"><i class="fa fa-database"></i> Stock</a>
</li>

<li>
<a href="/activity/"><i class="fa fa-book"></i> Stock Ledger</a>
</li>

<li>
<a href="/admin/"><i class="fa fa-cog"></i> Admin</a>
</li>

</ul>

</div>

<div class="main">

{% block content %}

{% endblock %}

</div>

</body>
</html>
